<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal Captions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      padding: 14px;
      margin: 0;
      color: #222;
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      margin: 0 0 12px;
      color: #1a73e8;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 9px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select, input[type="password"], input[type="url"] {
      width: 100%;
      padding: 6px 8px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, opacity 0.2s;
    }

    select:focus, input:focus {
      border-color: #1a73e8;
      background: #fff;
    }

    /* Lock config fields while capturing */
    .field.locked select,
    .field.locked input {
      opacity: 0.5;
      pointer-events: none;
    }

    /* ---- status bar ---- */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 10px 0 4px;
      padding: 5px 8px;
      background: #f5f5f5;
      border-radius: 5px;
      font-size: 11px;
      color: #555;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #bbb;
      transition: background 0.2s;
    }

    #status-dot.connecting { background: #f9a825; }
    #status-dot.connected  { background: #34a853; }
    #status-dot.error      { background: #d93025; }

    #caption-source {
      color: #888;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ---- switch notice ---- */
    #switch-notice {
      display: none;
      font-size: 11px;
      color: #1a73e8;
      padding: 3px 8px 6px;
      text-align: center;
    }

    /* ---- buttons ---- */
    #btn-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    #btn-row button {
      flex: 1;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #start-btn {
      background: #1a73e8;
      color: #fff;
    }

    #stop-btn {
      background: #d93025;
      color: #fff;
    }

    #btn-row button:hover:not(:disabled) { opacity: 0.88; }

    #btn-row button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 12px 0 6px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    input[type="range"] {
      width: 100%;
      margin: 3px 0 0;
      accent-color: #1a73e8;
    }

  </style>
</head>
<body>
  <h1>Universal Captions</h1>

  <div class="field" id="field-provider">
    <label for="provider">Provider</label>
    <select id="provider">
      <option value="openai_chunked">OpenAI Whisper (chunked)</option>
      <option value="openai_realtime">OpenAI Realtime</option>
    </select>
  </div>

  <div class="field" id="field-api-key">
    <label for="api-key">API Key</label>
    <input type="password" id="api-key" placeholder="sk-…" autocomplete="off" spellcheck="false" />
  </div>

  <div class="field" id="field-backend-url">
    <label for="backend-url">Backend URL</label>
    <input type="url" id="backend-url" value="ws://localhost:8000" />
  </div>

  <div class="section-label">Overlay</div>

  <div class="field">
    <label for="font-size">Font Size — <span id="font-size-val">18</span>px</label>
    <input type="range" id="font-size" min="12" max="32" value="18" />
  </div>

  <div class="field">
    <label for="bg-opacity">Box Opacity — <span id="bg-opacity-val">72</span>%</label>
    <input type="range" id="bg-opacity" min="0" max="100" value="72" />
  </div>

  <div class="field">
    <label for="text-opacity">Text Opacity — <span id="text-opacity-val">100</span>%</label>
    <input type="range" id="text-opacity" min="0" max="100" value="100" />
  </div>

  <div id="status-bar">
    <span id="status-dot"></span>
    <span id="status-text">Not connected</span>
    <span id="caption-source"></span>
  </div>

  <div id="switch-notice">Switched caption source to this tab</div>

  <div id="btn-row">
    <button id="start-btn">Start Captions</button>
    <button id="stop-btn" disabled>Stop Captions</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
