<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal Captions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      padding: 14px;
      margin: 0;
      color: #222;
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      margin: 0 0 12px;
      color: #1a73e8;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 9px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select, input[type="password"], input[type="url"] {
      width: 100%;
      padding: 6px 8px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input:focus {
      border-color: #1a73e8;
      background: #fff;
    }

    /* ---- status bar ---- */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 10px 0;
      padding: 5px 8px;
      background: #f5f5f5;
      border-radius: 5px;
      font-size: 11px;
      color: #555;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #bbb;
      transition: background 0.2s;
    }

    #status-dot.connecting { background: #f9a825; }
    #status-dot.connected  { background: #34a853; }
    #status-dot.error      { background: #d93025; }

    /* ---- toggle button ---- */
    #toggle-btn {
      width: 100%;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #1a73e8;
      color: #fff;
      transition: background 0.15s, opacity 0.15s;
    }

    #toggle-btn.active  { background: #d93025; }
    #toggle-btn:hover   { opacity: 0.88; }
    #toggle-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }
  </style>
</head>
<body>
  <h1>Universal Captions</h1>

  <div class="field">
    <label for="provider">Provider</label>
    <select id="provider">
      <option value="openai_chunked">OpenAI Whisper (chunked)</option>
      <option value="openai_realtime">OpenAI Realtime</option>
      <option value="local_whisper">Local Whisper</option>
    </select>
  </div>

  <div class="field">
    <label for="api-key">API Key</label>
    <input type="password" id="api-key" placeholder="sk-…" autocomplete="off" spellcheck="false" />
  </div>

  <div class="field">
    <label for="backend-url">Backend URL</label>
    <input type="url" id="backend-url" value="ws://localhost:8000" />
  </div>

  <div id="status-bar">
    <span id="status-dot"></span>
    <span id="status-text">Not connected</span>
  </div>

  <button id="toggle-btn">Start Captions</button>

  <script src="popup.js"></script>
</body>
</html>
